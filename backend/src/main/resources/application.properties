spring.application.name=game
# Support launching from either the backend folder or the IntelliJ project root.
# When both files exist, .env.prod is imported last so it can activate the prod profile.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:SiliconValleyTrail/backend/.env[.properties],optional:file:.env.prod[.properties],optional:file:backend/.env.prod[.properties],optional:file:SiliconValleyTrail/backend/.env.prod[.properties]
spring.profiles.default=local
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT config shared by all profiles
security.jwt.secret=${JWT_SECRET_KEY}
security.jwt.expiration=${JWT_EXP_TIME}